services:
  nightwing:
    image: python:3.12-slim
    container_name: nightwing
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      python -m nightwing.main run --case-id compose-demo"
    env_file:
      - .env
    volumes:
      - ./:/app
    restart: "no"
